<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO Quantity Pivot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0faff;min-height:100vh;padding:1rem;}
#app{max-width:1100px;margin:0 auto;}

.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;background:#bde8ff;border-radius:12px;padding:10px 14px;}
.topbar-title{font-size:14px;font-weight:700;color:#1a3a4a;white-space:nowrap;margin-right:4px;}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;background:#ffb8d9;border:2px solid #ff7fbf;color:#c2336e;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;}
.upload-btn:hover{background:#ff9fcf;}
.upload-btn svg{width:13px;height:13px;stroke:#c2336e;fill:none;}
.filter-pill{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #bde8ff;border-radius:999px;padding:4px 12px;}
.filter-pill label{font-size:10px;color:#4a7a8a;white-space:nowrap;}
.filter-pill select{font-size:12px;border:none;background:transparent;color:#1a3a4a;outline:none;cursor:pointer;}
.search-pill{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #ffb8d9;border-radius:999px;padding:3px 12px;}
.search-pill span{font-size:12px;color:#e8539a;}
.search-pill input{font-size:12px;border:none;background:transparent;color:#1a3a4a;outline:none;width:130px;}
.search-pill input::placeholder{color:#d4a8bc;}
.filename{font-size:10px;color:#7a9aaa;background:#fff;border:1.5px dashed #bde8ff;border-radius:999px;padding:3px 10px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* sheet tabs */
.tabs-wrap{overflow-x:auto;margin-bottom:.5rem;padding-bottom:2px;}
.tabs{display:flex;gap:5px;min-width:max-content;}
.tab{padding:5px 13px;font-size:11px;font-weight:600;cursor:pointer;border-radius:999px;border:1.5px solid #bde8ff;background:#fff;color:#4a7a8a;transition:all .15s;white-space:nowrap;}
.tab:hover{background:#e0f4ff;border-color:#7dcfff;}
.tab.active{background:#7dcfff;border-color:#3ab4f2;color:#042C53;}
.tab.tab-all.active{background:#ffb8d9;border-color:#ff7fbf;color:#c2336e;}

/* sub tabs SR / On Order */
.subtabs{display:flex;gap:6px;margin-bottom:.75rem;}
.subtab{padding:5px 18px;font-size:12px;font-weight:700;cursor:pointer;border-radius:8px 8px 0 0;border:1.5px solid #bde8ff;border-bottom:none;background:#e8f7ff;color:#4a7a8a;transition:all .15s;}
.subtab:hover{background:#d0eeff;}
.subtab.active{background:#fff;color:#1a3a4a;border-color:#bde8ff;}
.subtab.active.pink{color:#c2336e;}

/* cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:.75rem;}
.card{background:#fff;border:2px solid #bde8ff;border-radius:12px;padding:10px 14px;text-align:center;}
.card.pink{border-color:#ffb8d9;}
.card-icon{font-size:16px;margin-bottom:3px;}
.card-label{font-size:9px;color:#7a9aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.card-val{font-size:17px;font-weight:700;color:#1a3a4a;}

/* rule badge */
.rule-badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:999px;background:#e0f4ff;color:#1a8bbf;border:1px solid #bde8ff;margin-bottom:.6rem;}
.rule-badge.pink{background:#ffe0f0;color:#c2336e;border-color:#ffb8d9;}

/* tables */
.table-wrap{overflow-x:auto;border-radius:0 14px 14px 14px;border:2px solid #bde8ff;background:#fff;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:380px;}
thead tr{background:#e0f4ff;}
th{padding:9px 14px;text-align:left;font-weight:700;font-size:11px;color:#1a8bbf;border-bottom:2px solid #bde8ff;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;user-select:none;}
th.right{text-align:right;}
th.sortable{cursor:pointer;}
th.sortable:hover{background:#d4f0ff;}
.sort-icon{display:inline-block;margin-left:4px;font-size:10px;}
th.sort-asc .sort-icon::after{content:"▲";}
th.sort-desc .sort-icon::after{content:"▼";}
th:not(.sort-asc):not(.sort-desc) .sort-icon::after{content:"⇅";opacity:.4;}
td{padding:9px 14px;border-bottom:1px solid #e8f7ff;color:#1a3a4a;font-size:13px;}
td.right{text-align:right;font-variant-numeric:tabular-nums;}
td.mono{font-family:monospace;font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f7fcff;}
.total-row td{font-weight:700;background:#ffe0f0;color:#c2336e;border-top:2px solid #ffb8d9;}
.rank-1 td:first-child::before{content:"★ ";color:#f2c84b;}
.rank-2 td:first-child::before{content:"✦ ";color:#3ab4f2;font-size:11px;}
.rank-3 td:first-child::before{content:"◆ ";color:#e8539a;font-size:11px;}
.bar-wrap{display:flex;align-items:center;margin-top:3px;}
.bar{height:3px;border-radius:999px;background:#7dcfff;}

/* status badges */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.badge-incomplete{background:#fff3cd;color:#856404;border:1px solid #ffc107;}
.badge-onorder{background:#cff4fc;color:#055160;border:1px solid #86cfda;}
.badge-other{background:#f1efeb;color:#5f5e5a;border:1px solid #d3d1c7;}
td.nosel{user-select:none;-webkit-user-select:none;}
td.sel{user-select:text;-webkit-user-select:text;}
td.mono{font-family:monospace;font-size:12px;}
.clear-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 13px;border-radius:999px;background:#fff;border:1.5px solid #ffb8d9;color:#c2336e;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s;}
.clear-btn:hover{background:#ffe0f0;}

/* remarks filter dropdown */
.remarks-pill{position:relative;display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #c4b5fd;border-radius:999px;padding:4px 12px;cursor:pointer;user-select:none;}
.remarks-pill label{font-size:10px;color:#7c3aed;white-space:nowrap;cursor:pointer;}
.remarks-pill .remarks-trigger{font-size:12px;color:#1a3a4a;background:transparent;border:none;outline:none;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.remarks-pill .remarks-trigger .arrow{font-size:9px;color:#7c3aed;flex-shrink:0;}
.remarks-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:999;background:#fff;border:1.5px solid #c4b5fd;border-radius:12px;box-shadow:0 4px 18px rgba(124,58,237,.13);min-width:200px;padding:8px 0;max-height:260px;overflow-y:auto;}
.remarks-pill.open .remarks-dropdown{display:block;}
.remarks-dd-header{display:flex;align-items:center;justify-content:space-between;padding:5px 12px 6px;border-bottom:1px solid #ede9fe;margin-bottom:4px;}
.remarks-dd-header span{font-size:10px;font-weight:700;color:#7c3aed;}
.remarks-dd-header button{font-size:10px;color:#7c3aed;background:none;border:none;cursor:pointer;padding:0;font-weight:700;}
.remarks-dd-header button:hover{text-decoration:underline;}
.remarks-search-wrap{padding:5px 10px 6px;border-bottom:1px solid #ede9fe;}
.remarks-search-wrap input{width:100%;font-size:12px;border:1.5px solid #c4b5fd;border-radius:999px;padding:4px 10px;outline:none;color:#1a3a4a;background:#faf8ff;}
.remarks-search-wrap input::placeholder{color:#c4b5fd;}
.remarks-item{display:flex;align-items:center;gap:8px;padding:5px 12px;cursor:pointer;transition:background .1s;}
.remarks-item:hover{background:#f5f3ff;}
.remarks-item input[type=checkbox]{accent-color:#7c3aed;width:13px;height:13px;flex-shrink:0;cursor:pointer;}
.remarks-item label{font-size:12px;color:#1a3a4a;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.remarks-empty{font-size:11px;color:#c4b5fd;text-align:center;padding:10px 12px;}

.empty-state{text-align:center;padding:3rem 1rem;background:#fff;border-radius:0 14px 14px 14px;border:2px solid #bde8ff;}
.empty-deco{font-size:44px;margin-bottom:10px;}
.empty-state p{font-size:13px;line-height:1.8;color:#4a7a8a;}
.empty-state small{font-size:11px;color:#aac8d0;display:block;margin-top:8px;}
#file-input{display:none;}
footer{text-align:center;margin-top:1rem;font-size:10px;color:#aac8d0;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="topbar-title">DO Pivot ✦</span>
    <label class="upload-btn" for="file-input">
      <svg viewBox="0 0 16 16" stroke-width="1.8"><path d="M2 10v3h12v-3M8 2v8M5 5l3-3 3 3"/></svg>
      Upload Excel
    </label>
    <input type="file" id="file-input" accept=".xlsx,.xls">
    <span class="filename" id="filename">☁ belum ada file</span>
    <div class="filter-pill">
      <label>☀ Bulan:</label>
      <select id="month-filter"><option value="">Semua</option></select>
    </div>
    <div class="filter-pill">
      <label>✦ Tahun:</label>
      <select id="year-filter"><option value="">Semua</option></select>
    </div>
    <div class="search-pill">
      <span>🔍</span>
      <input type="text" id="search-customer" placeholder="Cari customer...">
    </div>
    <div class="remarks-pill" id="remarks-pill">
      <label>💬 Remarks:</label>
      <div class="remarks-trigger" id="remarks-trigger">
        <span id="remarks-label">Semua</span>
        <span class="arrow">▾</span>
      </div>
      <div class="remarks-dropdown" id="remarks-dropdown">
        <div class="remarks-dd-header">
          <span>Filter Remarks</span>
          <button onclick="toggleAllRemarks(event)">Select All</button>
        </div>
        <div class="remarks-search-wrap">
          <input type="text" id="remarks-search" placeholder="🔍 Cari remarks..." oninput="renderRemarksList()">
        </div>
        <div id="remarks-list"></div>
      </div>
    </div>
    <button class="clear-btn" onclick="clearFilters()">✕ Clear Filter</button>
  </div>

  <div class="tabs-wrap" id="tabs-wrap" style="display:none">
    <div class="tabs" id="product-tabs"></div>
  </div>

  <div id="subtabs-wrap" style="display:none">
    <div class="subtabs">
      <div class="subtab active" id="subtab-sr" onclick="setSubTab('sr')">SR</div>
      <div class="subtab" id="subtab-onorder" onclick="setSubTab('onorder')">On Order</div>
    </div>
  </div>

  <div id="rule-badge-wrap" style="display:none"><div class="rule-badge" id="rule-badge"></div></div>
  <div id="summary-cards" class="cards" style="display:none"></div>
  <div id="pivot-container">
    <div class="empty-state">
      <div class="empty-deco">☁</div>
      <p>Upload file Excel-mu dulu yuk~<br>tab otomatis muncul sesuai nama sheet!</p>
      <small>SO_CS · SO_GC · SO_CGF · SO_CG · SO_CGM · SO_MDX · SO_BY PRODUCT · SO_Fructose · dll</small>
    </div>
  </div>
  <footer>made with ✦ — DO Pivot App</footer>
</div>

<script>
var sheetData = {};
var currentSheet = 'ALL';
var currentSubTab = 'sr';  // 'sr' | 'onorder'
var sortCol = 'val';
var sortDir = 'desc';
var sortColOO = 'sono';
var sortDirOO = 'asc';
var MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
var ON_ORDER_STATUSES = ['uncomplete','incomplete','on order','onorder','open'];
var allRemarks = [];       // semua unique remarks values
var selectedRemarks = null;  // null=semua, []=kosong, [...]=pilihan

function getSheetRule(name) {
  var k = name.toLowerCase().replace(/[\s_]/g,'');
  if (/fructose/.test(k) || k==='sogc' || k==='gc') return {col:'qty',  label:'DO Qty only'};
  if (/mdx/.test(k)||/^(so)?cg$/.test(k)||/cgf/.test(k)||/cgm/.test(k)||/^(so)?cs$/.test(k)) return {col:'adj', label:'DO Qty (ADJ) only'};
  if (/byproduct|by.?product/.test(k)) return {col:'both', label:'Auto filter: Product = M', productFilter:'M'};
  return {col:'both', label:''};
}
function sheetTabLabel(n){ return n.replace(/^SO[_\s]?/i,'').trim()||n; }

function parseDate(val){
  if(!val)return null;
  if(typeof val==='number'){var d=XLSX.SSF.parse_date_code(val);if(d)return new Date(d.y,d.m-1,d.d);}
  var s=String(val).trim(),dt=new Date(s);if(!isNaN(dt))return dt;
  var p=s.split(/[\/\-\.]/);
  if(p.length===3){var a=+p[0],b=+p[1],c=+p[2];if(a>31)return new Date(a,b-1,c);if(c>31)return new Date(c,b-1,a);}
  return null;
}
function normH(row){var n={};Object.keys(row).forEach(function(k){n[k.toLowerCase().replace(/[\s_\.\(\)\-]/g,'')]=k;});return n;}
function findCol(n,cands){for(var i=0;i<cands.length;i++){var k=cands[i].toLowerCase().replace(/[\s_\.\(\)\-]/g,'');if(n[k])return n[k];}return null;}
function findHeaderRow(ws){
  var ref=ws['!ref'];if(!ref)return 0;
  var range=XLSX.utils.decode_range(ref);
  for(var r=range.s.r;r<=Math.min(range.s.r+20,range.e.r);r++){
    var vals=[];
    for(var c=range.s.c;c<=range.e.c;c++){var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];if(cell&&cell.v!=null)vals.push(String(cell.v).toLowerCase().replace(/[\s_\.\(\)\-]/g,''));}
    var hits=['customer','doqty','dodate'].filter(function(k){return vals.some(function(v){return v.indexOf(k)>=0;});});
    if(hits.length>=2)return r;
  }
  return 0;
}

function parseSheetRows(ws, name){
  var rule=getSheetRule(name);
  var hr=findHeaderRow(ws);
  var raw=XLSX.utils.sheet_to_json(ws,{defval:'',range:hr});
  if(!raw.length)return[];
  var norm=normH(raw[0]);
  var colC=findCol(norm,['customer','cust','customername']);
  var colQ=findCol(norm,['doqty','doquantity']);
  var colA=findCol(norm,['doqtyadj','doqtyadjusted','doadj']);
  var colD=findCol(norm,['dodate','deliverydate','tanggaldo']);
  var colP=findCol(norm,['product','produk']);
  var colSO=findCol(norm,['sono','sono','sonumber']);
  var colBal=findCol(norm,['balance','sisa','remaining']);
  var colStat=findCol(norm,['status']);
  var colRem=findCol(norm,['remarks','remark','keterangan','note','notes']);
  if(!colC)return[];
  return raw.map(function(r){
    var doDate=parseDate(r[colD]);
    var status=colStat?String(r[colStat]||'').trim():'';
    return{
      customer:String(r[colC]||'').trim(),
      doQty:parseFloat(r[colQ])||0,
      doQtyAdj:parseFloat(r[colA])||0,
      doDate:doDate,
      month:doDate?doDate.getMonth():null,
      year:doDate?doDate.getFullYear():null,
      product:colP?String(r[colP]||'').trim():'',
      soNo:colSO?String(r[colSO]||'').trim():'',
      balance:parseFloat(r[colBal])||0,
      status:status,
      remarks:colRem?String(r[colRem]||'').trim():''
    };
  }).filter(function(r){
    if(!r.customer||r.customer.toUpperCase()==='CUSTOMER')return false;
    if(rule.productFilter&&r.product.toUpperCase()!==rule.productFilter.toUpperCase())return false;
    return true;
  });
}

function isOnOrder(status){
  var s=status.toLowerCase().trim();
  return ON_ORDER_STATUSES.some(function(k){return s.indexOf(k)>=0;});
}

function loadFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array',cellDates:false});
    sheetData={};
    wb.SheetNames.forEach(function(name){
      var rows=parseSheetRows(wb.Sheets[name],name);
      if(rows.length>0)sheetData[name]=rows;
    });
    if(!Object.keys(sheetData).length){alert('Tidak ada data terbaca. Pastikan ada kolom CUSTOMER, DO QTY, DO DATE ya~');return;}
    currentSheet='ALL';currentSubTab='sr';sortCol='val';sortDir='desc';
    document.getElementById('filename').textContent='✦ '+file.name;
    document.getElementById('search-customer').value='';
    populateFilters();renderTabs();renderSubTabs();render();
  };
  reader.readAsArrayBuffer(file);
}

function getAllRows(){var all=[];Object.values(sheetData).forEach(function(rows){rows.forEach(function(r){all.push(r);});});return all;}
function getCurrentRows(){return currentSheet==='ALL'?getAllRows():(sheetData[currentSheet]||[]);}

function populateFilters(){
  var all=getAllRows();
  var years=[...new Set(all.map(function(r){return r.year;}).filter(Boolean))].sort();
  var months=[...new Set(all.map(function(r){return r.month;}).filter(function(r){return r!==null;}))].sort(function(a,b){return a-b;});
  var ys=document.getElementById('year-filter');ys.innerHTML='<option value="">Semua</option>';years.forEach(function(y){ys.innerHTML+='<option value="'+y+'">'+y+'</option>';});
  var ms=document.getElementById('month-filter');ms.innerHTML='<option value="">Semua</option>';months.forEach(function(m){ms.innerHTML+='<option value="'+m+'">'+MONTHS[m]+'</option>';});
  // populate remarks
  allRemarks=[...new Set(all.map(function(r){return r.remarks;}).filter(function(v){return v!=='';}) )].sort();
  selectedRemarks=null;
  renderRemarksList();
  updateRemarksLabel();
  // show/hide pill
  document.getElementById('remarks-pill').style.display=allRemarks.length?'':'none';
}

function renderTabs(){
  var wrap=document.getElementById('tabs-wrap'),tc=document.getElementById('product-tabs');
  wrap.style.display='';
  tc.innerHTML=['ALL'].concat(Object.keys(sheetData)).map(function(t){
    var isAll=t==='ALL',active=t===currentSheet;
    var cls='tab'+(isAll?' tab-all':'')+(active?' active':'');
    return '<div class="'+cls+'" data-s="'+t+'">'+(isAll?'☁ Semua':sheetTabLabel(t))+'</div>';
  }).join('');
  tc.querySelectorAll('.tab').forEach(function(el){
    el.addEventListener('click',function(){
      currentSheet=el.dataset.s;
      sortCol='val';sortDir='desc';sortColOO='sono';sortDirOO='asc';
      renderTabs();renderSubTabs();render();
    });
  });
}

function renderSubTabs(){
  var wrap=document.getElementById('subtabs-wrap');
  // only show subtabs when a specific sheet is selected (not ALL)
  if(currentSheet==='ALL'){wrap.style.display='none';currentSubTab='sr';return;}
  wrap.style.display='';
  document.getElementById('subtab-sr').className='subtab'+(currentSubTab==='sr'?' active':'');
  document.getElementById('subtab-onorder').className='subtab'+(currentSubTab==='onorder'?' active pink':'');
}

function setSubTab(sub){
  currentSubTab=sub;
  sortCol='val';sortDir='desc';sortColOO='sono';sortDirOO='asc';
  renderSubTabs();render();
}

function getFiltered(){
  var rows=getCurrentRows();
  var m=document.getElementById('month-filter').value;
  var y=document.getElementById('year-filter').value;
  var q=document.getElementById('search-customer').value.toLowerCase().trim();
  return rows.filter(function(r){
    if(m!==''&&r.month!==parseInt(m))return false;
    if(y!==''&&r.year!==parseInt(y))return false;
    if(q&&r.customer.toLowerCase().indexOf(q)<0)return false;
    if(selectedRemarks!==null&&selectedRemarks.indexOf(r.remarks)<0)return false;
    return true;
  });
}

// ── SR pivot ──────────────────────────────────────────────────────
function buildPivot(data,col){
  var map={};
  data.forEach(function(r){var k=r.customer||'(kosong)';if(!map[k])map[k]={doQty:0,doQtyAdj:0};map[k].doQty+=r.doQty;map[k].doQtyAdj+=r.doQtyAdj;});
  var arr=Object.entries(map);
  arr.sort(function(a,b){
    var av,bv;
    if(sortCol==='customer'){av=a[0].toLowerCase();bv=b[0].toLowerCase();return sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);}
    if(sortCol==='adj'){av=a[1].doQtyAdj;bv=b[1].doQtyAdj;}else{av=a[1].doQty;bv=b[1].doQty;}
    return sortDir==='asc'?av-bv:bv-av;
  });
  return arr;
}

// ── On Order table ────────────────────────────────────────────────
function buildOnOrder(data){
  var rows=data.filter(function(r){return isOnOrder(r.status);});
  rows.sort(function(a,b){
    var av,bv;
    if(sortColOO==='customer'){av=a.customer.toLowerCase();bv=b.customer.toLowerCase();return sortDirOO==='asc'?(av>bv?1:-1):(av<bv?1:-1);}
    if(sortColOO==='balance'){av=a.balance;bv=b.balance;return sortDirOO==='asc'?av-bv:bv-av;}
    if(sortColOO==='status'){av=a.status.toLowerCase();bv=b.status.toLowerCase();return sortDirOO==='asc'?(av>bv?1:-1):(av<bv?1:-1);}
    // sono default
    av=String(a.soNo);bv=String(b.soNo);return sortDirOO==='asc'?(av>bv?1:-1):(av<bv?1:-1);
  });
  return rows;
}

function fmt(n){return Number(n).toLocaleString('en-US',{maximumFractionDigits:3,useGrouping:false});}

function toggleSort(col){if(sortCol===col){sortDir=sortDir==='desc'?'asc':'desc';}else{sortCol=col;sortDir='desc';}render();}
function toggleSortOO(col){if(sortColOO===col){sortDirOO=sortDirOO==='desc'?'asc':'desc';}else{sortColOO=col;sortDirOO='asc';}render();}

function thSortClass(col,current,dir,extra){
  var cls=(extra||'');
  if(current===col)cls+=' sortable sort-'+dir;
  else cls+=' sortable';
  return cls.trim();
}

function statusBadge(s){
  var sl=s.toLowerCase();
  if(sl.indexOf('incomplete')>=0||sl.indexOf('uncomplete')>=0)return '<span class="badge badge-incomplete">'+s+'</span>';
  if(sl.indexOf('on order')>=0||sl.indexOf('onorder')>=0)return '<span class="badge badge-onorder">'+s+'</span>';
  return '<span class="badge badge-other">'+s+'</span>';
}

function render(){
  var rule=currentSheet==='ALL'?{col:'both',label:''}:getSheetRule(currentSheet);
  var col=rule.col;
  var filtered=getFiltered();

  // rule badge
  var rb=document.getElementById('rule-badge-wrap'),rbi=document.getElementById('rule-badge');
  if(rule.label&&currentSubTab==='sr'){
    rb.style.display='';
    rbi.className='rule-badge'+(rule.productFilter?' pink':'');
    rbi.textContent=(rule.productFilter?'🔒 '+rule.label+' · ':'')+
      (col==='qty'?'📦 DO Qty only':col==='adj'?'✦ DO Qty (ADJ) only':'');
  } else rb.style.display='none';

  if(currentSubTab==='onorder'){
    renderOnOrder(filtered);
  } else {
    renderSR(filtered, col, rule);
  }
}

function renderSR(filtered, col, rule){
  var pivot=buildPivot(filtered,col);
  var totalQty=pivot.reduce(function(s,e){return s+e[1].doQty;},0);
  var totalAdj=pivot.reduce(function(s,e){return s+e[1].doQtyAdj;},0);
  var maxVal=pivot.length?(col==='adj'?pivot.reduce(function(mx,e){return Math.max(mx,e[1].doQtyAdj);},0):pivot.reduce(function(mx,e){return Math.max(mx,e[1].doQty);},0)):1;

  var lbl=currentSheet==='ALL'?'Semua Sheet':currentSheet;
  var sc=document.getElementById('summary-cards');sc.style.display='';
  var c3=col==='adj'?'<div class="card pink"><div class="card-icon">✦</div><div class="card-label">Total DO Qty (ADJ)</div><div class="card-val">'+fmt(totalAdj)+'</div></div>':'<div class="card"><div class="card-icon">📦</div><div class="card-label">Total DO Qty</div><div class="card-val">'+fmt(totalQty)+'</div></div>';
  var c4=col==='both'?'<div class="card pink"><div class="card-icon">✦</div><div class="card-label">Total DO Qty (ADJ)</div><div class="card-val">'+fmt(totalAdj)+'</div></div>':'';
  sc.innerHTML='<div class="card"><div class="card-icon">📋</div><div class="card-label">Sheet aktif</div><div class="card-val" style="font-size:13px">'+lbl+'</div></div>'+
    '<div class="card"><div class="card-icon">👥</div><div class="card-label">Customer</div><div class="card-val">'+pivot.length+'</div></div>'+c3+c4;

  var pc=document.getElementById('pivot-container');
  if(!pivot.length){pc.innerHTML='<div class="empty-state"><div class="empty-deco">🌸</div><p>Data kosong~</p></div>';return;}

  var custCls=thSortClass('customer',sortCol,sortDir,'');
  var valCls =thSortClass('val',sortCol,sortDir,'right');
  var adjCls =thSortClass('adj',sortCol,sortDir,'right');

  var thead='';
  if(col==='both'){
    thead='<tr><th class="'+custCls+'" data-sort="customer">Customer<span class="sort-icon"></span></th>'+
      '<th class="'+valCls+'" data-sort="val">DO Qty<span class="sort-icon"></span></th>'+
      '<th class="'+adjCls+'" data-sort="adj">DO Qty (ADJ)<span class="sort-icon"></span></th></tr>';
  } else if(col==='adj'){
    thead='<tr><th class="'+custCls+'" data-sort="customer">Customer<span class="sort-icon"></span></th>'+
      '<th class="'+adjCls+'" data-sort="adj">DO Qty (ADJ)<span class="sort-icon"></span></th></tr>';
  } else {
    thead='<tr><th class="'+custCls+'" data-sort="customer">Customer<span class="sort-icon"></span></th>'+
      '<th class="'+valCls+'" data-sort="val">DO Qty<span class="sort-icon"></span></th></tr>';
  }

  var rows=pivot.map(function(entry,i){
    var cust=entry[0],v=entry[1];
    var mainVal=col==='adj'?v.doQtyAdj:v.doQty;
    var pct=maxVal>0?Math.round((mainVal/maxVal)*100):0;
    var rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    var tds='';
    if(col==='both') tds='<td class="right"><div>'+fmt(v.doQty)+'</div><div class="bar-wrap"><div class="bar" style="width:'+pct+'%;max-width:120px"></div></div></td><td class="right">'+fmt(v.doQtyAdj)+'</td>';
    else if(col==='adj') tds='<td class="right"><div>'+fmt(v.doQtyAdj)+'</div><div class="bar-wrap"><div class="bar" style="width:'+pct+'%;max-width:120px"></div></div></td>';
    else tds='<td class="right"><div>'+fmt(v.doQty)+'</div><div class="bar-wrap"><div class="bar" style="width:'+pct+'%;max-width:120px"></div></div></td>';
    return '<tr class="'+rc+'"><td>'+cust+'</td>'+tds+'</tr>';
  }).join('');

  var totalTd='';
  if(col==='both') totalTd='<td class="right">'+fmt(totalQty)+'</td><td class="right">'+fmt(totalAdj)+'</td>';
  else if(col==='adj') totalTd='<td class="right">'+fmt(totalAdj)+'</td>';
  else totalTd='<td class="right">'+fmt(totalQty)+'</td>';

  pc.innerHTML='<div class="table-wrap"><table><thead>'+thead+'</thead><tbody>'+rows+
    '<tr class="total-row"><td>✦ Total</td>'+totalTd+'</tr></tbody></table></div>';
  pc.querySelectorAll('th.sortable').forEach(function(th){th.addEventListener('click',function(){toggleSort(th.dataset.sort);});});
}

function renderOnOrder(filtered){
  var rows=buildOnOrder(filtered);

  // summary cards
  var sc=document.getElementById('summary-cards');sc.style.display='';
  var totalBal=rows.reduce(function(s,r){return s+r.balance;},0);
  sc.innerHTML=
    '<div class="card" style="padding:6px 12px"><div class="card-label" style="font-size:9px">Sheet</div><div class="card-val" style="font-size:13px">'+(currentSheet==='ALL'?'Semua':currentSheet)+'</div></div>'+
    '<div class="card" style="padding:6px 12px"><div class="card-label" style="font-size:9px">On Order / Incomplete</div><div class="card-val" style="font-size:15px">'+rows.length+'</div></div>'+
    '<div class="card pink" style="padding:6px 12px"><div class="card-label" style="font-size:9px">Total Balance</div><div class="card-val" style="font-size:15px">'+fmt(totalBal)+'</div></div>';

  var pc=document.getElementById('pivot-container');
  if(!rows.length){
    pc.innerHTML='<div class="empty-state"><div class="empty-deco">🌸</div><p>Tidak ada data On Order / Incomplete~</p></div>';
    return;
  }

  // kolom: SO No → Balance → Status → Customer
  var c1=thSortClass('sono',    sortColOO,sortDirOO,'');
  var c2=thSortClass('balance', sortColOO,sortDirOO,'right');
  var c3=thSortClass('status',  sortColOO,sortDirOO,'');
  var c4=thSortClass('customer',sortColOO,sortDirOO,'');

  var thead='<tr>'+
    '<th class="'+c1+'" data-sort="sono">SO No.<span class="sort-icon"></span></th>'+
    '<th class="'+c2+'" data-sort="balance">Balance<span class="sort-icon"></span></th>'+
    '<th class="'+c3+'" data-sort="status">Status<span class="sort-icon"></span></th>'+
    '<th class="'+c4+'" data-sort="customer">Customer<span class="sort-icon"></span></th>'+
    '</tr>';

  var trs=rows.map(function(r){
    return '<tr>'+
      '<td class="mono sel">'+r.soNo+'</td>'+
      '<td class="right sel">'+fmt(r.balance)+'</td>'+
      '<td class="nosel">'+statusBadge(r.status)+'</td>'+
      '<td class="nosel">'+r.customer+'</td>'+
      '</tr>';
  }).join('');

  pc.innerHTML='<div class="table-wrap"><table><thead>'+thead+'</thead><tbody>'+trs+'</tbody></table></div>';
  pc.querySelectorAll('th.sortable').forEach(function(th){th.addEventListener('click',function(){toggleSortOO(th.dataset.sort);});});
}

document.getElementById('file-input').addEventListener('change',function(e){if(e.target.files[0])loadFile(e.target.files[0]);});
document.getElementById('month-filter').addEventListener('change',render);
document.getElementById('year-filter').addEventListener('change',render);
document.getElementById('search-customer').addEventListener('input',render);

// ── Remarks filter ────────────────────────────────────────────────
document.getElementById('remarks-pill').style.display='none'; // hidden until file loaded

document.getElementById('remarks-trigger').addEventListener('click',function(e){
  e.stopPropagation();
  document.getElementById('remarks-pill').classList.toggle('open');
});
document.addEventListener('click',function(){
  document.getElementById('remarks-pill').classList.remove('open');
});
document.getElementById('remarks-dropdown').addEventListener('click',function(e){e.stopPropagation();});

function isAllSelected(){ return selectedRemarks===null; }
function isNoneSelected(){ return Array.isArray(selectedRemarks)&&selectedRemarks.length===0; }

function renderRemarksList(){
  var list=document.getElementById('remarks-list');
  var q=(document.getElementById('remarks-search').value||'').toLowerCase().trim();
  var visible=allRemarks.filter(function(r){return !q||r.toLowerCase().indexOf(q)>=0;});
  var btn=document.querySelector('.remarks-dd-header button');
  btn.textContent=isAllSelected()?'Deselect All':'Select All';
  if(!visible.length){
    list.innerHTML='<div class="remarks-empty">Tidak ada hasil~</div>';
    return;
  }
  list.innerHTML=visible.map(function(rem){
    var checked=isAllSelected()||(Array.isArray(selectedRemarks)&&selectedRemarks.indexOf(rem)>=0);
    var id='rem-'+rem.replace(/\W/g,'_');
    return '<div class="remarks-item" onclick="toggleRemark(\''+rem.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'
      +'<input type="checkbox" id="'+id+'"'+(checked?' checked':'')+'>'
      +'<label for="'+id+'">'+rem+'</label>'
      +'</div>';
  }).join('');
}

function toggleRemark(val){
  if(isAllSelected()){
    // dari "semua" → uncheck 1 = pilih semua kecuali ini
    selectedRemarks=allRemarks.filter(function(r){return r!==val;});
  } else {
    var idx=selectedRemarks.indexOf(val);
    if(idx>=0) selectedRemarks.splice(idx,1);
    else selectedRemarks.push(val);
    // kalau semua sudah dicentang lagi → kembali ke "semua"
    if(selectedRemarks.length===allRemarks.length) selectedRemarks=null;
  }
  renderRemarksList();
  updateRemarksLabel();
  render();
}

function toggleAllRemarks(e){
  e.stopPropagation();
  selectedRemarks=isAllSelected()?[]:null; // toggle: semua↔tidak ada
  renderRemarksList();
  updateRemarksLabel();
  render();
}

function updateRemarksLabel(){
  var lbl=document.getElementById('remarks-label');
  if(isAllSelected()) lbl.textContent='Semua';
  else if(isNoneSelected()) lbl.textContent='(kosong)';
  else if(selectedRemarks.length===1) lbl.textContent=selectedRemarks[0];
  else lbl.textContent=selectedRemarks.length+' dipilih';
}

function clearFilters(){
  document.getElementById('month-filter').value='';
  document.getElementById('year-filter').value='';
  document.getElementById('search-customer').value='';
  document.getElementById('remarks-search').value='';
  selectedRemarks=null;
  renderRemarksList();
  updateRemarksLabel();
  render();
}
</script>
